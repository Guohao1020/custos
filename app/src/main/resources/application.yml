server:
  port: 8080
custos:
  engine:
    storage-url: jdbc:mysql://mysql:3306/custos
    storage-username: custos
    storage-password: ${CUSTOS_DB_PWD:custos}
    shares: 5
    threshold: 3
  nacos:
    server-addr: ${NACOS_ADDR:}
    namespace: public
    policy-data-id: custos-policy
    group: DEFAULT_GROUP
    username: ${NACOS_USERNAME:}
    password: ${NACOS_PASSWORD:}
  identity:
    issuer: custos
  transport:
    mcp-stdio: false
