server:
  port: 8080
custos:
  engine:
    storage-url: jdbc:mysql://mysql:3306/custos
    storage-username: custos
    storage-password: ${CUSTOS_DB_PWD:custos}
    shares: 5
    threshold: 3
  nacos:
    server-addr: ${NACOS_ADDR:}
    namespace: public
    policy-data-id: custos-policy
    group: DEFAULT_GROUP
    username: ${NACOS_USERNAME:}
    password: ${NACOS_PASSWORD:}
  identity:
    issuer: custos
  transport:
    mcp-stdio: false
management:
  endpoints:
    web:
      exposure:
        # 只暴露 health + prometheus；prometheus 经 AdminTokenFilter admin-gated，health 开放
        include: health,prometheus
  endpoint:
    health:
      # never：health 不泄 seal/装配明细（避免暴露 sealed 态给未鉴权方）
      show-details: never
  prometheus:
    metrics:
      export:
        # 显式开启 Prometheus 导出。Micrometer 默认即开启，此处显式声明是为生产姿态明确意图，
        # 并避免 classpath 上传递依赖（旧 micrometer/simpleclient 配套）影响 defaults 时仍稳定注册
        # /actuator/prometheus（product-specific 属性优先于 management.defaults.metrics.export.enabled）。
        enabled: true
