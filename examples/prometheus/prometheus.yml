global:
  scrape_interval: 15s

scrape_configs:
  - job_name: custos
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials: demo-token        # = compose 的 CUSTOS_ADMIN_TOKEN（admin-gated /actuator/prometheus）
    static_configs:
      - targets: ["custos:8080"]
