name: custos

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: custos
      MYSQL_USER: custos
      MYSQL_PASSWORD: custospwd
    ports: ["3306:3306"]
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpwd"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Nacos 3.2：控制台（含 AI 管理中心/MCP 注册中心）从 8848 分离到独立 8080 端口 → 宿主 8081。
  # 三个 NACOS_AUTH_* 必填（缺失则容器直接退出 255）；API 鉴权开启走完全生产姿态。
  nacos:
    image: nacos/nacos-server:v3.2.2
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: Q3VzdG9zRGVtb1NlY3JldEtleTAxMjM0NTY3ODlhYmNkZWY=   # base64(35 字符密钥)，demo 专用
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: custos-demo
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports: ["8848:8848", "9848:9848", "8081:8080"]   # gRPC 必须保持 主端口+1000 偏移
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v3/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # 一次性管理员初始化：Nacos 3.x 无默认密码（POST /v3/auth/user/admin 仅首次有效，之后 409 → || true 幂等）。
  # 控制台登录与 custos 客户端鉴权共用 nacos/DemoPass123。
  nacos-init:
    image: curlimages/curl:8.10.1
    command: ["sh", "-c", "curl -fsS -X POST 'http://nacos:8848/nacos/v3/auth/user/admin' -d 'password=DemoPass123' || true"]
    depends_on:
      nacos:
        condition: service_healthy

  custos:
    build: ..
    environment:
      CUSTOS_DB_PWD: custospwd
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: DemoPass123
      CUSTOS_ADMIN_TOKEN: demo-token
    ports: ["8080:8080"]
    depends_on:
      mysql:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully

  # 后台管理控制台（M16）：多阶段镜像 node 构建 Vue 产物 → nginx 服 dist。
  # nginx 把 /api/ 反代到 custos:8080（同源，构建用 VITE_API_BASE=/api 免跨域）。
  # 宿主开 http://localhost:3000，登录页填 CUSTOS_ADMIN_TOKEN（见 custos 服务，demo 为 demo-token）。
  console:
    build:
      context: ../console
      args:
        VITE_API_BASE: /api
    ports: ["3000:80"]
    depends_on:
      - custos

  # Prometheus：按 prometheus.yml 的 job custos 每 15s 抓 custos:8080/actuator/prometheus。
  # 该端点 admin-gated（无 token 401），故 scrape 配置带 Bearer demo-token（= custos 的 CUSTOS_ADMIN_TOKEN）。
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on:
      - custos

  # Grafana：匿名 Viewer 免登录看图（admin/admin 可改盘）；provisioning 自动挂 Prometheus 数据源 +
  # 「Custos 概览」仪表盘。宿主 3001 避开 console 的 3000，浏览器开 http://localhost:3001 即见盘。
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]
    depends_on:
      - prometheus
