<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Secretless 查询链路</title>
  <desc id="desc">一次查询经过令牌校验、策略决策、动态凭证签发、只读执行、凭证撤销与审计落链，全程不把密钥暴露给 Agent。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#f6fff9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27606b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <style>
      .title{font:700 31px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#102033}
      .subtitle{font:500 16px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#526171}
      .step{fill:#ffffff;stroke:#d7e5e5;stroke-width:1.3;rx:18;filter:url(#shadow)}
      .risk{fill:#fff7f3;stroke:#efc4ad;stroke-width:1.3;rx:18;filter:url(#shadow)}
      .ok{fill:#f5fff7;stroke:#b8dfc1;stroke-width:1.3;rx:18;filter:url(#shadow)}
      .label{font:700 17px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#102033}
      .small{font:500 13px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#5c6b7a}
      .num{font:800 22px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#0f766e}
      .line{fill:none;stroke:#27606b;stroke-width:2.4;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#94a3b8;stroke-width:1.8;stroke-dasharray:6 7;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <text x="64" y="70" class="title">一次 secretless 查询：凭证在 Custos 内部签发、使用、焚毁</text>
  <text x="64" y="101" class="subtitle">Agent 只接收查询结果；密码、连接串、租约内部信息永远不进入 LLM 上下文。</text>
  <rect x="64" y="170" width="150" height="126" class="step"/>
  <text x="88" y="207" class="num">1</text>
  <text x="88" y="239" class="label">校验令牌</text>
  <text x="88" y="265" class="small">JWT ES256</text>
  <rect x="250" y="170" width="160" height="126" class="step"/>
  <text x="274" y="207" class="num">2</text>
  <text x="274" y="239" class="label">策略决策</text>
  <text x="274" y="265" class="small">RBAC + ABAC</text>
  <rect x="446" y="170" width="168" height="126" class="ok"/>
  <text x="470" y="207" class="num">3</text>
  <text x="470" y="239" class="label">签发 v_ro_*</text>
  <text x="470" y="265" class="small">短 TTL 凭证</text>
  <rect x="650" y="170" width="164" height="126" class="step"/>
  <text x="674" y="207" class="num">4</text>
  <text x="674" y="239" class="label">执行 SELECT</text>
  <text x="674" y="265" class="small">单条只读查询</text>
  <rect x="850" y="170" width="164" height="126" class="risk"/>
  <text x="874" y="207" class="num">5</text>
  <text x="874" y="239" class="label">撤销凭证</text>
  <text x="874" y="265" class="small">finally DROP USER</text>
  <rect x="1050" y="170" width="166" height="126" class="step"/>
  <text x="1074" y="207" class="num">6</text>
  <text x="1074" y="239" class="label">追加审计</text>
  <text x="1074" y="265" class="small">哈希链记录</text>
  <path d="M214 233 L250 233" class="line"/>
  <path d="M410 233 L446 233" class="line"/>
  <path d="M614 233 L650 233" class="line"/>
  <path d="M814 233 L850 233" class="line"/>
  <path d="M1014 233 L1050 233" class="line"/>
  <rect x="168" y="364" width="944" height="72" rx="20" fill="#102033"/>
  <text x="207" y="407" style="font:700 20px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#ffffff">不变量：</text>
  <text x="315" y="407" style="font:500 18px Inter,Segoe UI,Microsoft YaHei,Arial,sans-serif;fill:#dbeafe">响应无密钥，日志无密钥，Nacos 无密钥，LLM 上下文无密钥。</text>
  <path d="M530 296 C530 344 260 336 260 364" class="dash"/>
  <path d="M932 296 C932 344 994 336 994 364" class="dash"/>
</svg>
