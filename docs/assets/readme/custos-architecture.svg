<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Custos detailed architecture</title>
  <desc id="desc">A detailed architecture diagram of Custos showing consumers, access interfaces, host services, identity, authorization, broker enforcement, engine kernel, Nacos control plane, storage, audit, and protected resources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.45" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#f5fff8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#315b82"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c8da0"/>
    </marker>
    <style>
      .title{font:700 38px Inter,Segoe UI,Arial,sans-serif;fill:#102033}
      .subtitle{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#526171}
      .section{font:700 21px Inter,Segoe UI,Arial,sans-serif;fill:#102033}
      .label{font:700 16px Inter,Segoe UI,Arial,sans-serif;fill:#13243a}
      .small{font:500 13px Inter,Segoe UI,Arial,sans-serif;fill:#526171}
      .tiny{font:500 12px Inter,Segoe UI,Arial,sans-serif;fill:#64748b}
      .panel{fill:#ffffff;stroke:#d9e5ef;stroke-width:1.3;rx:18;filter:url(#shadow)}
      .subpanel{fill:#f8fbff;stroke:#c7d7e8;stroke-width:1.1;rx:14}
      .kernel{fill:#f3fff6;stroke:#add9b7;stroke-width:1.2;rx:14}
      .control{fill:#fff8ed;stroke:#ead0a5;stroke-width:1.2;rx:14}
      .resource{fill:#f7f3ff;stroke:#d5c6f2;stroke-width:1.2;rx:14}
      .storage{fill:#f6f8fb;stroke:#cbd5e1;stroke-width:1.2;rx:14}
      .warn{fill:#fff7f3;stroke:#efc4ad;stroke-width:1.2;rx:14}
      .line{fill:none;stroke:#315b82;stroke-width:2.2;marker-end:url(#arrow)}
      .softline{fill:none;stroke:#7c8da0;stroke-width:1.7;stroke-dasharray:7 7;marker-end:url(#arrowGray)}
      .guard{fill:#102033;rx:16}
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="64" y="72" class="title">Custos architecture: security execution plane for AI agents</text>
  <text x="64" y="108" class="subtitle">Identity, policy decision, secretless enforcement, encrypted storage, and tamper-evident audit around Nacos discovery/control.</text>

  <rect x="54" y="160" width="250" height="560" class="panel"/>
  <text x="84" y="204" class="section">Consumers</text>
  <rect x="84" y="238" width="190" height="54" class="subpanel"/>
  <text x="119" y="271" class="label">Claude / Codex</text>
  <rect x="84" y="314" width="190" height="54" class="subpanel"/>
  <text x="111" y="347" class="label">Autonomous Agent</text>
  <rect x="84" y="390" width="190" height="54" class="subpanel"/>
  <text x="112" y="423" class="label">Spring Service</text>
  <rect x="84" y="466" width="190" height="54" class="subpanel"/>
  <text x="127" y="499" class="label">Admin User</text>
  <text x="84" y="594" class="tiny">Agents never receive credentials.</text>
  <text x="84" y="618" class="tiny">They receive results and decisions.</text>

  <rect x="370" y="160" width="250" height="560" class="panel"/>
  <text x="400" y="204" class="section">Access surface</text>
  <rect x="400" y="238" width="190" height="54" class="subpanel"/>
  <text x="456" y="271" class="label">MCP stdio</text>
  <rect x="400" y="314" width="190" height="54" class="subpanel"/>
  <text x="461" y="347" class="label">REST API</text>
  <rect x="400" y="390" width="190" height="54" class="subpanel"/>
  <text x="432" y="423" class="label">Java Starter</text>
  <rect x="400" y="466" width="190" height="54" class="subpanel"/>
  <text x="440" y="499" class="label">CLI / Console</text>
  <text x="400" y="594" class="tiny">Sealed mode keeps only operator</text>
  <text x="400" y="618" class="tiny">endpoints available until unsealed.</text>

  <rect x="690" y="132" width="480" height="624" class="panel"/>
  <text x="730" y="178" class="section">Custos host</text>
  <text x="730" y="205" class="small">Spring Boot runtime, sealed by default, unsealed by Shamir threshold.</text>

  <rect x="730" y="238" width="178" height="88" class="subpanel"/>
  <text x="779" y="268" class="label">Identity</text>
  <text x="752" y="291" class="tiny">JWT ES256, OBO</text>
  <text x="752" y="311" class="tiny">SPIFFE X.509 SVID</text>

  <rect x="952" y="238" width="178" height="88" class="subpanel"/>
  <text x="994" y="268" class="label">Policy PDP</text>
  <text x="974" y="291" class="tiny">RBAC + domain</text>
  <text x="974" y="311" class="tiny">ABAC, JIT approval</text>

  <rect x="730" y="360" width="178" height="88" class="subpanel"/>
  <text x="777" y="390" class="label">Broker PEP</text>
  <text x="752" y="413" class="tiny">secretless query_db</text>
  <text x="752" y="433" class="tiny">read-only SQL guard</text>

  <rect x="952" y="360" width="178" height="88" class="subpanel"/>
  <text x="989" y="390" class="label">Approvals</text>
  <text x="974" y="413" class="tiny">pending queue</text>
  <text x="974" y="433" class="tiny">approve / deny</text>

  <rect x="730" y="492" width="400" height="214" class="kernel"/>
  <text x="762" y="530" class="section">Engine kernel</text>
  <text x="762" y="570" class="small">Barrier encryption and keyring</text>
  <text x="762" y="600" class="small">Seal / unseal with Shamir shares</text>
  <text x="762" y="630" class="small">Lease manager and revocation</text>
  <text x="762" y="660" class="small">AK/SK, KV, dynamic DB credentials</text>
  <text x="762" y="690" class="small">Hash-chain audit and GM / Intl cipher suites</text>

  <rect x="1250" y="132" width="280" height="278" class="control"/>
  <text x="1284" y="178" class="section">Nacos 3.2 control plane</text>
  <rect x="1284" y="212" width="210" height="42" class="control"/>
  <text x="1311" y="239" class="label">Policy config</text>
  <rect x="1284" y="270" width="210" height="42" class="control"/>
  <text x="1310" y="297" class="label">MCP / AI registry</text>
  <rect x="1284" y="328" width="210" height="42" class="control"/>
  <text x="1308" y="355" class="label">Service discovery</text>

  <rect x="1250" y="478" width="280" height="278" class="resource"/>
  <text x="1284" y="524" class="section">Protected resources</text>
  <rect x="1284" y="558" width="210" height="42" class="resource"/>
  <text x="1338" y="585" class="label">Databases</text>
  <rect x="1284" y="616" width="210" height="42" class="resource"/>
  <text x="1336" y="643" class="label">AK / SK APIs</text>
  <rect x="1284" y="674" width="210" height="42" class="resource"/>
  <text x="1328" y="701" class="label">Internal tools</text>

  <rect x="690" y="820" width="390" height="98" class="storage"/>
  <text x="724" y="858" class="section">Storage backend</text>
  <text x="724" y="889" class="small">MySQL stores ciphertext, seal config, resources, leases, approvals, audit rows.</text>

  <rect x="1120" y="820" width="410" height="98" class="warn"/>
  <text x="1154" y="858" class="section">Hard boundary</text>
  <text x="1154" y="889" class="small">No cleartext secret in LLM context, API response, logs, or Nacos.</text>

  <path d="M304 418 C332 418 346 418 370 418" class="line"/>
  <path d="M620 418 C652 418 664 418 690 418" class="line"/>
  <path d="M908 282 C930 282 930 282 952 282" class="line"/>
  <path d="M819 326 C819 342 819 344 819 360" class="line"/>
  <path d="M1041 326 C1041 342 1041 344 1041 360" class="line"/>
  <path d="M819 448 C819 468 819 472 819 492" class="line"/>
  <path d="M1041 448 C1041 468 1041 472 1041 492" class="line"/>
  <path d="M1130 600 C1180 600 1200 579 1250 579" class="line"/>
  <path d="M1130 650 C1194 650 1200 637 1250 637" class="line"/>
  <path d="M1130 544 C1194 544 1200 234 1250 234" class="softline"/>
  <path d="M1130 282 C1194 282 1200 292 1250 292" class="softline"/>
  <path d="M930 706 C930 760 885 766 885 820" class="softline"/>
  <path d="M1068 706 C1148 760 1280 760 1325 820" class="softline"/>

  <rect x="168" y="788" width="420" height="78" class="guard"/>
  <text x="202" y="820" style="font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#fff">Execution invariant</text>
  <text x="202" y="849" style="font:500 15px Inter,Segoe UI,Arial,sans-serif;fill:#dbeafe">authorize -> mint short-lived credential -> execute -> revoke -> audit</text>
</svg>
